<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Networking, якого я не планував — coming soon countdown" />
  <meta name="theme-color" content="#ffffff" />

  <meta property="og:title" content="Networking, якого я не планував" />
  <meta property="og:description" content="Далі більше. Наступний синк — 30 липня о 19:00." />
  <meta property="og:type" content="website" />

  <title>Networking — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --line: #e2e8f0;
      --line-strong: #cbd5e1;
      --panel: rgba(248, 250, 252, 0.84);
      --purple: #8b5cf6;
      --purple-strong: #7c3aed;
      --purple-soft: rgba(139, 92, 246, 0.12);
      --shadow: 0 28px 90px rgba(15, 23, 42, 0.10);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      color-scheme: light;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 42px);
    }

    .noise,
    .grid,
    .orb {
      position: fixed;
      pointer-events: none;
    }

    .grid {
      inset: 0;
      z-index: -3;
      background-image: radial-gradient(#dbe3ee 1.45px, transparent 1.45px);
      background-size: clamp(42px, 5vw, 78px) clamp(42px, 5vw, 78px);
      opacity: 0.72;
    }

    .orb {
      z-index: -2;
      width: 58vmin;
      height: 58vmin;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
          radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.22), transparent 64%),
          radial-gradient(circle at 44% 60%, rgba(124, 58, 237, 0.14), transparent 58%);
      filter: blur(10px);
    }

    .noise {
      inset: 0;
      z-index: -1;
      opacity: 0.28;
      background-image:
          linear-gradient(115deg, transparent 0%, rgba(139, 92, 246, 0.06) 34%, transparent 62%),
          linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0.88));
    }

    .page {
      width: min(100%, 980px);
      display: grid;
      gap: clamp(28px, 4.2vw, 56px);
      text-align: center;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.72rem, 1.3vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--purple);
      animation: fadeUp 650ms ease both;
    }

    .meta::before,
    .meta::after {
      content: "";
      width: 34px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple));
      opacity: 0.65;
    }

    .meta::after {
      background: linear-gradient(90deg, var(--purple), transparent);
    }

    .hero-title {
      font-size: clamp(3.6rem, 12vw, 8.4rem);
      line-height: 0.78;
      font-weight: 900;
      letter-spacing: -0.085em;
      text-transform: uppercase;
      animation: fadeUp 650ms 90ms ease both;
    }

    .event-card {
      position: relative;
      width: min(100%, 770px);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: clamp(34px, 5vw, 56px) clamp(22px, 5vw, 60px);
      overflow: hidden;
      isolation: isolate;
      animation: fadeUp 650ms 180ms ease both;
    }

    .event-card::before {
      content: "";
      position: absolute;
      inset: -1px auto -1px -1px;
      width: 18px;
      background: linear-gradient(180deg, var(--purple), #a78bfa, var(--purple-strong));
      border-radius: var(--radius) 0 0 var(--radius);
      box-shadow: 0 0 34px rgba(139, 92, 246, 0.35);
    }

    .event-card::after {
      content: "event://networking-sync";
      position: absolute;
      right: 22px;
      top: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(100, 116, 139, 0.38);
    }

    .event-title {
      font-size: clamp(1.7rem, 4vw, 2.65rem);
      line-height: 1.04;
      font-weight: 850;
      letter-spacing: -0.055em;
    }

    .event-subtitle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      color: var(--purple);
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1rem, 2.1vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .event-subtitle::before {
      content: "—";
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(96px, 1fr));
      gap: clamp(18px, 3vw, 38px);
      width: min(100%, 620px);
      margin: 0 auto;
      animation: fadeUp 650ms 270ms ease both;
    }

    .time-item {
      min-width: 0;
    }

    .time-val {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.8rem, 6.5vw, 5rem);
      line-height: 0.86;
      font-weight: 600;
      letter-spacing: -0.09em;
      font-variant-numeric: tabular-nums;
    }

    .time-label {
      display: block;
      margin-top: 16px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.72rem, 1.4vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .system-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: -8px;
      color: var(--faint);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      animation: fadeUp 650ms 360ms ease both;
    }

    .system-line::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.5);
      animation: pulse 1.9s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.45); }
      72% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .page {
        gap: 30px;
      }

      .meta {
        letter-spacing: 0.14em;
        gap: 8px;
      }

      .meta::before,
      .meta::after {
        width: 18px;
      }

      .hero-title {
        font-size: clamp(3.2rem, 17vw, 5.6rem);
        letter-spacing: -0.075em;
      }

      .event-card {
        border-radius: 24px;
        padding: 36px 22px 34px;
      }

      .event-card::before {
        width: 11px;
      }

      .event-card::after {
        display: none;
      }

      .countdown {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .time-val {
        font-size: clamp(2.15rem, 13vw, 4rem);
      }

      .time-label {
        margin-top: 12px;
        font-size: 0.62rem;
        letter-spacing: 0.13em;
      }
    }

    @media (max-width: 440px) {
      body {
        padding: 18px 12px;
      }

      .page {
        gap: 26px;
      }

      .meta {
        font-size: 0.64rem;
      }

      .event-title {
        font-size: clamp(1.55rem, 9vw, 2.1rem);
      }

      .event-subtitle {
        margin-top: 18px;
        font-size: 0.95rem;
      }

      .countdown {
        gap: 8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
<div class="grid" aria-hidden="true"></div>
<div class="orb" aria-hidden="true"></div>
<div class="noise" aria-hidden="true"></div>

<main class="page" aria-label="Сторінка очікування події">
  <div class="meta">// July 30 • 19:00 • Next Sync</div>

  <h1 class="hero-title">Незабаром</h1>

  <section class="event-card" aria-label="Назва події">
    <h2 class="event-title">Networking, якого я не планував</h2>
    <p class="event-subtitle">Далі більше</p>
  </section>

  <section class="countdown" id="timer" aria-label="Зворотний відлік" aria-live="polite">
    <div class="time-item">
      <span class="time-val" id="days">00</span>
      <span class="time-label">днів</span>
    </div>
    <div class="time-item">
      <span class="time-val" id="hours">00</span>
      <span class="time-label">годин</span>
    </div>
    <div class="time-item">
      <span class="time-val" id="minutes">00</span>
      <span class="time-label">хвилин</span>
    </div>
    <div class="time-item">
      <span class="time-val" id="seconds">00</span>
      <span class="time-label">секунд</span>
    </div>
  </section>

  <div class="system-line" id="message">status: waiting for next sync</div>
</main>

<script>
  const target = new Date('2026-07-30T19:00:00+03:00').getTime();

  const nodes = {
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
    message: document.getElementById('message')
  };

  const labels = {
    waiting: 'status: waiting for next sync',
    live: 'status: sync is live'
  };

  function format(value) {
    return Math.max(0, value).toString().padStart(2, '0');
  }

  function updateCountdown() {
    const diff = target - Date.now();

    if (diff <= 0) {
      nodes.days.textContent = '00';
      nodes.hours.textContent = '00';
      nodes.minutes.textContent = '00';
      nodes.seconds.textContent = '00';
      nodes.message.textContent = labels.live;
      document.title = 'Networking — Live';
      return;
    }

    nodes.days.textContent = format(Math.floor(diff / 864e5));
    nodes.hours.textContent = format(Math.floor((diff % 864e5) / 36e5));
    nodes.minutes.textContent = format(Math.floor((diff % 36e5) / 6e4));
    nodes.seconds.textContent = format(Math.floor((diff % 6e4) / 1e3));
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
